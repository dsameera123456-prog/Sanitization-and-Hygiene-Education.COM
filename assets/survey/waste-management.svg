<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-labelledby="title desc">
  <title id="title">Waste segregation bins</title>
  <desc id="desc">Three colorful waste bins for wet, dry, and recyclable waste in a clean public area.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FACC15"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="900" height="700" fill="url(#sky)"/>
  <circle cx="735" cy="120" r="68" fill="#FACC15" opacity="0.9"/>
  <path d="M0 455C130 405 260 420 384 454C514 490 641 490 900 432V700H0Z" fill="#DCFCE7"/>
  <path d="M0 508C160 470 317 492 448 526C585 562 722 552 900 504V700H0Z" fill="#BBF7D0"/>
  <g filter="url(#shadow)">
    <g transform="translate(160 210)">
      <path d="M28 78H188L170 380H46Z" fill="url(#green)"/>
      <rect x="12" y="42" width="192" height="52" rx="18" fill="#166534"/>
      <rect x="60" y="0" width="96" height="34" rx="12" fill="#166534"/>
      <path d="M82 216H134M108 190V242" stroke="#ECFDF5" stroke-width="18" stroke-linecap="round"/>
      <text x="108" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#ECFDF5">WET</text>
    </g>
    <g transform="translate(354 164)">
      <path d="M28 78H188L170 426H46Z" fill="url(#blue)"/>
      <rect x="12" y="42" width="192" height="52" rx="18" fill="#1D4ED8"/>
      <rect x="60" y="0" width="96" height="34" rx="12" fill="#1D4ED8"/>
      <path d="M82 233C99 206 119 206 136 233M78 266H140M88 302C104 324 122 324 138 302" fill="none" stroke="#EFF6FF" stroke-width="14" stroke-linecap="round"/>
      <text x="108" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#EFF6FF">DRY</text>
    </g>
    <g transform="translate(548 210)">
      <path d="M28 78H188L170 380H46Z" fill="url(#yellow)"/>
      <rect x="12" y="42" width="192" height="52" rx="18" fill="#A16207"/>
      <rect x="60" y="0" width="96" height="34" rx="12" fill="#A16207"/>
      <path d="M78 228L104 184H138L114 224H148L104 282L116 238H78Z" fill="#FFFBEB"/>
      <text x="108" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#FFFBEB">RECYCLE</text>
    </g>
  </g>
  <g opacity="0.8">
    <circle cx="99" cy="525" r="18" fill="#8B5CF6"/>
    <rect x="752" y="510" width="72" height="22" rx="11" fill="#4F46E5"/>
    <rect x="74" y="590" width="108" height="26" rx="13" fill="#06B6D4"/>
    <circle cx="820" cy="585" r="22" fill="#22C55E"/>
  </g>
</svg>
